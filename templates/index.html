<!DOCTYPE html>
<html>
<head>
  <title>Mapa com Ícone de Carro</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100vw; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  let map = L.map('map').setView([-22.9, -43.2], 15);
  let autoFollow = true;
  let marker = null;

  // Desativa o auto-follow após mover
  map.once('dragstart', () => autoFollow = false);
  map.once('zoomstart', () => autoFollow = false);

  // Ícone personalizado
  const iconeCarro = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/481/481405.png',
    iconSize: [40, 40], // largura, altura
    iconAnchor: [20, 20] // ponto do ícone que encosta na coordenada
  });

  function atualizarLocalizacao(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    if (!marker) {
      marker = L.marker([lat, lon], { icon: iconeCarro }).addTo(map).bindPopup("Você está aqui");
    } else {
      marker.setLatLng([lat, lon]);
    }

    if (autoFollow) {
      map.setView([lat, lon], map.getZoom());
    }
  }

  function erroLocalizacao(err) {
    console.log("Erro ao obter localização:", err.message);
  }

  if (navigator.geolocation) {
    setInterval(() => {
      navigator.geolocation.getCurrentPosition(atualizarLocalizacao, erroLocalizacao);
    }, 3000);
  } else {
    alert("Geolocalização não suportada neste navegador.");
  }
</script>

</body>
</html>

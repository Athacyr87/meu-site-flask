<!DOCTYPE html>
<html>
<head>
  <title>Mapa Estilo Uber</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100vw; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  let map = L.map('map').setView([-22.9, -43.2], 15); // Pode iniciar com qualquer cidade

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  let marker = null;

  function atualizarLocalizacao(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    if (!marker) {
      marker = L.marker([lat, lon]).addTo(map).bindPopup("Você está aqui").openPopup();
    } else {
      marker.setLatLng([lat, lon]);
    }

    map.setView([lat, lon]);
  }

  function erroLocalizacao(err) {
    alert("Erro ao obter localização: " + err.message);
  }

  if (navigator.geolocation) {
    // Atualiza a localização a cada 3 segundos
    setInterval(() => {
      navigator.geolocation.getCurrentPosition(atualizarLocalizacao, erroLocalizacao);
    }, 3000);
  } else {
    alert("Geolocalização não é suportada neste navegador.");
  }
</script>

</body>
</html>

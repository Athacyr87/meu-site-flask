<!DOCTYPE html>
<html>
<head>
  <title>Mapa sem recenter automático</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100vw; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  let map = L.map('map').setView([-22.9, -43.2], 15);
  let autoFollow = true;
  let marker = null;

  // Mapa base
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Desativa o autoFollow na primeira vez que o usuário mexe no mapa
  map.once('dragstart', () => autoFollow = false);
  map.once('zoomstart', () => autoFollow = false);

  function atualizarLocalizacao(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    if (!marker) {
      marker = L.marker([lat, lon]).addTo(map).bindPopup("Você está aqui").openPopup();
    } else {
      marker.setLatLng([lat, lon]);
    }

    if (autoFollow) {
      map.setView([lat, lon], map.getZoom());
    }
  }

  function erroLocalizacao(err) {
    console.log("Erro ao obter localização:", err.message);
  }

  if (navigator.geolocation) {
    setInterval(() => {
      navigator.geolocation.getCurrentPosition(atualizarLocalizacao, erroLocalizacao);
    }, 3000);
  } else {
    alert("Geolocalização não suportada neste navegador.");
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Navegação Estilo Uber</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    #map { height: 100%; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>

<script>
  const map = L.map('map').setView([-22.9, -43.2], 15);
  const tile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  let marcador = null;
  let rota = null;

  const destino = L.latLng(-22.915, -43.175); // ponto fixo de destino

  function atualizarPosicao(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const localAtual = L.latLng(lat, lon);

    if (!marcador) {
      marcador = L.marker(localAtual).addTo(map).bindPopup("Você").openPopup();
    } else {
      marcador.setLatLng(localAtual);
    }

    map.setView(localAtual);

    if (rota) {
      rota.setWaypoints([localAtual, destino]);
    } else {
      rota = L.Routing.control({
        waypoints: [localAtual, destino],
        routeWhileDragging: false,
        show: false,
        language: 'pt-BR',
        draggableWaypoints: false,
        createMarker: () => null
      }).addTo(map);
    }
  }

  function erroPosicao(err) {
    console.error("Erro ao obter localização:", err);
    alert("Erro ao acessar GPS: " + err.message);
  }

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(atualizarPosicao, erroPosicao, {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    });
  } else {
    alert("Geolocalização não suportada");
  }
</script>

</body>
</html>
